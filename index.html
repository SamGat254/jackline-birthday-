<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Jackline 🎉</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 40px;
            font-size: 3em;
        }

        img {
            width: 200px;
            border-radius: 50%;
            margin-top: 20px;
            border: 5px solid white;
        }

        #typing {
            font-size: 1.5em;
            margin: 20px;
            min-height: 60px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            background: white;
            color: #ff4b5c;
            border-radius: 10px;
            cursor: pointer;
        }

        #countdown {
            font-size: 1.3em;
            margin-top: 20px;
        }

        /* Floating hearts */
        .heart {
            position: fixed;
            bottom: -10px;
            font-size: 20px;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1>🎉 Happy Birthday Jackline 🎂</h1>

    <img src="jackline.jpg">

    <div id="typing"></div>

    <button onclick="showLove()">Click Me ❤️</button>

    <p id="love"></p>

    <div id="countdown"></div>

<script>
    // 💌 Typing Effect
    const message = "You are special to me 💖 I’m really lucky to have you in my life. Happy Birthday once again 🎉";
    let index = 0;

    function typeEffect() {
        if (index < message.length) {
            document.getElementById("typing").innerHTML += message.charAt(index);
            index++;
            setTimeout(typeEffect, 50);
        }
    }

    typeEffect();

    // ❤️ Button Message
    function showLove() {
        document.getElementById("love").innerHTML = "You mean a lot to me 💕😊";
    }

    // 🎁 Countdown Timer (SET HER BIRTHDAY DATE HERE)
    const birthday = new Date("April 5, 2026 00:00:00")

    setInterval(function() {
        const now = new Date().getTime();
        const distance = birthday - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML =
        "🎁 Countdown: " + days + "d " + hours + "h "
        + minutes + "m " + seconds + "s";

    }, 1000);

    // 💖 Floating Hearts Generator
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
