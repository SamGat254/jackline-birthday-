<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Jackline 🎉</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial, sans-serif;
            color: #333;
        }

        h1 {
            margin-top: 60px;
            font-size: 3em;
        }

        p {
            font-size: 1.4em;
            margin: 20px;
        }

        img {
            width: 200px;
            border-radius: 50%;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            background: #ff4b5c;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>🎉 Happy Birthday Jackline 🎂</h1>

    <img src="jackline.jpg" alt="Jackline">

    <p>
        You are such an amazing person 💖  
        I’m really grateful to have you in my life.  
        May your day be full of happiness, love, and laughter 🎉
    </p>

    <button onclick="showMessage()">Click for Surprise ❤️</button>

    <p id="message"></p>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
            "You mean a lot to me 💕 Never forget that 😊";
        }
    </script>

</body>
</html>
